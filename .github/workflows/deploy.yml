name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VPS and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -euo pipefail
            export PATH="$HOME/.local/share/pnpm:/usr/local/bin:/usr/bin:/bin:$PATH"
            cd "${{ secrets.VPS_APP_DIR }}"
            git fetch --all --prune
            git reset --hard origin/main
            # Repo tracks sqlite for local dev; prod runs on postgres.
            sed -i 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma
            pnpm install --frozen-lockfile
            pnpm prisma db push --skip-generate
            pnpm prisma generate
            for f in \
              data/sat/maths.json \
              data/sat/maths-p2to5.json \
              data/sat/reading.json \
              data/sat/reading-p2to5.json \
              data/sat/writing.json \
              data/sat/writing-p2to5.json \
              data/ahss-arithmetic.json; do
              [ -f "$f" ] && pnpm exec tsx prisma/seed-sat.ts "$f"
            done
            pnpm exec node scripts/reset-reading-writing-schoolslug.mjs
            pnpm build
            pm2 restart habib-entry --update-env
            pm2 save
